name: Daily News Digest

on:
  schedule:
    - cron: '0 23 * * *'     # 23:00 UTC = 翌8:00 JST（毎日8時）
  workflow_dispatch: {}       # 手動実行ボタンも有効

permissions:
  contents: write             # data/ output/ をコミットして履歴を蓄積
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      # --- 非機密（必要ならリポジトリ変数/シークレットへ移動可） ---
      AZURE_OPENAI_ENDPOINT: https://snboku-0401-resource.cognitiveservices.azure.com
      AZURE_MODEL_DEPLOYMENT: gpt-5.4-mini
      AZURE_OPENAI_API_VERSION: preview
      # --- サービスプリンシパル（GitHub Secrets に登録。DefaultAzureCredentialが自動使用） ---
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      # --- Tavily 検索キー（GitHub Secrets に登録） ---
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Generate digest
        run: python main.py

      # --- 先にPagesへデプロイ（push失敗に左右されない）---
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: output
      - id: deploy
        uses: actions/deploy-pages@v4

      # --- data/output を履歴として push（競合しても job は失敗させない）---
      - name: Commit data & output (履歴蓄積)
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data output
          git commit -m "Daily digest $(date -u +%Y-%m-%d)" || { echo "no changes"; exit 0; }
          git pull --rebase -X ours origin main || true
          git push || echo "push skipped (remote ahead); デプロイは完了済み"
